apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: roboshop
  # These labels are replicaset labels reference
  labels:
    project: roboshop
    tier: frontend
    component: frontend
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
  # Using these labels, replicaset selects the pod.
    matchLabels:
      project: roboshop
      tier: frontend
      component: frontend
  # This is Pod definition, Pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: frontend
    spec:
      # volumes:
      # - name: nginx-config
      #   configMap:
      #     name: frontend
      containers:
      - name: frontend
        image: "{{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}"
        imagePullPolicy: Always       # Safe to pull everytime, there may be same version rebuilt and pushed.
        resources:
          # Soft limit
          requests:
            memory: "128Mi"
            cpu: "100m"
          # Hard limit
          limits:
            memory: "128Mi"
            cpu: "100m"
        # A readiness probe checks whether a container is ready to accept traffic. If it fails, K8s stops sending requests to that container.
        readinessProbe:
          # httpGet:
          #   path: /
          #   port: 80
          # To check whether the port is open/not
          tcpSocket:
            port: 80
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15       # Container will become available in 35 seconds.
        # A liveness probe checks whether a container is still running properly. If it fails, K8s restarts the container.
        livenessProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 2
          periodSeconds: 10
        # volumeMounts:
        # - name: nginx-config
        #   # By default it mounts and thinks as directory
        #   mountPath: "/etc/nginx/nginx.conf"
        #   subPath: nginx.conf
        #   readOnly: true
        # envFrom is used in a Pod specifications to load all key–value pairs from a ConfigMap or Secret as environment variables into a container.
        envFrom:
        - configMapRef:
            name: frontend