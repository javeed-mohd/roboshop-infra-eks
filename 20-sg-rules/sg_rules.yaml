bastion:
- name: bastion_internet # Bastion(secure gateway to access resources inside a private network i.e., Instances...) accepting connections from Internet
  port: 22 # SSH TCP -> Secure Shell Transmission Control Protcol
  src: internet
  dest: bastion
mongodb:
- name: mongodb_bastion # 2.MongoDB accepting connections from Bastion
  port: 27017
  src: bastion
  dest: mongodb
- name: mongodb_catalogue # 1.MongoDB accepting connections from Catalogue
  port: 27017
  src: catalogue
  dest: mongodb
- name: mongodb_user # 3.MongoDB accepting connections from User
  port: 27017
  src: user
  dest: mongodb