apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  # These labels are replicaset labels reference
  labels:
    project: roboshop
    tier: backend
    component: shipping
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
  # Using these labels, replicaset selects the pod.
    matchLabels:
      project: roboshop
      tier: backend
      component: shipping
  # This is Pod definition, Pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: shipping
    spec:
      containers:
      - name: shipping
        image: "{{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}"
        imagePullPolicy: Always       # Safe to pull everytime, there may be same version rebuilt and pushed.
        resources:
          # Soft limit
          requests:
            memory: "256Mi"
            cpu: "200m"
          # Hard limit
          limits:
            memory: "512Mi"
            cpu: "300m"
        # A readiness probe checks whether a container is ready to accept traffic. If it fails, K8s stops sending requests to that container.
        readinessProbe:
          # httpGet:
          #   path: /health
          #   port: 8080
          # To check whether the port is open/not
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 120       # Container will become available in 35 seconds.
        # A startup probe checks whether a container has successfully started. It is used for slow-starting applications and prevents premature restarts during initialization.
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 20
          periodSeconds: 10
        # A liveness probe checks whether a container is still running properly. If it fails, K8s restarts the container.
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 120
        # envFrom is used in a Pod specifications to load all key–value pairs from a ConfigMap or Secret as environment variables into a container.
        envFrom:
        - configMapRef:
            name: shipping